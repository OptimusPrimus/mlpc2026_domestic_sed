program: src/domestic_sed/training.py
project: domestic_sed_scheduler
method: bayes
run_cap: 30
metric:
  name: val/map
  goal: maximize
parameters:
  architecture-depth:
    value: 8
  max-epochs:
    value: 100
  learning-rate:
    value: !!float 1e-4
  min-learning-rate:
    distribution: uniform
    min: !!float 0
    max: !!float 1e-4
  lr-linear-decay-start-epoch:
    distribution: int_uniform
    min: 1
    max: 50
  architecture-base-multiplier:
    value: 2
command:
  - ${env}
  - python
  - -m
  - domestic_sed.training
  - --wandb-save-dir=/opt/scratch/paul/mlpc2025_dl_tutorial/wandb
  - --data-root=/opt/scratch/paul/data/real_desed
  - ${args}
